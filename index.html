<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bean Classifier AI: ระบบคัดแยกเมล็ดถั่วอัจฉริยะ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #a3e635; /* สีเขียวเมล็ดถั่ว */
            --bg-body: #0f172a; 
            --bg-card: #1e293b; 
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --error: #ef4444;
            --warning: #fbbf24;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header { margin-bottom: 30px; text-align: center; }
        h1 { font-size: 2rem; color: var(--primary); margin-bottom: 10px; }

        .app-card { 
            background-color: var(--bg-card);
            border: 1px solid #334155;
            border-radius: 16px; 
            width: 100%;
            max-width: 500px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .upload-section { margin-bottom: 20px; }
        input[type="file"] {
            width: 100%;
            color: var(--text-muted);
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
        }

        .image-container {
            margin: 15px 0;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            display: none; 
            border: 2px solid var(--primary);
        }
        .image-container.active { display: block; }
        img#preview { width: 100%; display: block; }

        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .btn-submit { 
            background: var(--primary);
            color: #0f172a; 
            padding: 16px; border: none; border-radius: 12px; 
            font-weight: 700; font-size: 16px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-clear {
            background: transparent; color: var(--error);
            padding: 12px; border: 1px solid var(--error); border-radius: 12px;
            font-weight: 600; cursor: pointer;
        }

        .result-container {
            margin-top: 25px; width: 100%; max-width: 500px; padding: 20px;
            border-radius: 12px; background-color: var(--bg-card);
            border: 1px solid #334155; display: none; text-align: center;
        }
        .result-container.active { display: block; }

        .spinner {
            display: none; width: 18px; height: 18px;
            border: 3px solid rgba(0,0,0,0.1); border-radius: 50%;
            border-top-color: #0f172a; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <h1>🫘 AI คัดแยกเมล็ดถั่ว</h1>
        <p>อัปโหลดรูปภาพเพื่อแยกชนิดและประเมินคุณภาพเมล็ดถั่ว</p>
    </header>

    <div class="app-card">
        <div class="upload-section">
            <input type="file" id="imageInput" accept="image/*" onchange="previewImage(event)">
        </div>

        <div id="imageWrapper" class="image-container">
            <img id="preview" alt="ตัวอย่างรูปภาพ">
        </div>

        <div class="btn-group">
            <button id="submitBtn" class="btn-submit" onclick="sendToAI()">
                <div id="btnSpinner" class="spinner"></div>
                <span id="btnText">เริ่มคัดแยกเมล็ดถั่ว</span>
            </button>
            <button id="clearBtn" class="btn-clear" onclick="clearImage()">
                🗑️ ล้างข้อมูล
            </button>
        </div>
    </div>

    <div id="resultWrapper" class="result-container">
        <h2 id="result"></h2>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const preview = document.getElementById('preview');
        const imageWrapper = document.getElementById('imageWrapper');
        const resultWrapper = document.getElementById('resultWrapper');
        const resultText = document.getElementById('result');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');

        function previewImage(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = () => {
                preview.src = reader.result;
                imageWrapper.classList.add('active');
                resultWrapper.classList.remove('active');
            }
            reader.readAsDataURL(file);
        }

        function clearImage() {
            imageInput.value = ""; 
            imageWrapper.classList.remove('active');
            resultWrapper.classList.remove('active');
            btnText.innerText = "เริ่มคัดแยกเมล็ดถั่ว";
        }

        async function sendToAI() {
            if (imageInput.files.length === 0) return alert("กรุณาเลือกรูปภาพ");

            submitBtn.disabled = true;
            btnSpinner.style.display = "block";
            btnText.innerText = "กำลังวิเคราะห์...";
            
            const formData = new FormData();
            formData.append("file", imageInput.files[0]);

            try {
                // เปลี่ยน URL เป็น URL Backend ของคุณ
                const response = await fetch("https://backend-soybean.onrender.com/predict", {
                    method: "POST",
                    body: formData
                });
                
                const data = await response.json();
                resultWrapper.classList.add('active');
                
                if(data.status === "success") {
                    resultText.innerText = "✅ " + data.message;
                    resultText.style.color = "var(--primary)";
                    if (data.image_base64) {
                        preview.src = "data:image/jpeg;base64," + data.image_base64;
                    }
                } else {
                    resultText.innerText = "❌ ผิดพลาด: " + data.message;
                    resultText.style.color = "var(--error)";
                }
            } catch (error) {
                resultText.innerText = "❌ เชื่อมต่อเซิร์ฟเวอร์ไม่ได้";
                resultText.style.color = "var(--error)";
                resultWrapper.classList.add('active');
            } finally {
                submitBtn.disabled = false;
                btnSpinner.style.display = "none";
                btnText.innerText = "เริ่มคัดแยกเมล็ดถั่ว";
            }
        }
    </script>
</body>
</html>
